<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alvaro Echeverria</title>
    <meta name="description" content="Alvaro Echeverria — Personal Site">
    <meta property="og:title" content="Alvaro Echeverria">
    <meta property="og:description" content="Alvaro Echeverria — Personal Site">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://echeverria.com">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Alvaro Echeverria">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            height: 100%;
            background: #0b0b0b;
            color: #e8e4df;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* subtle noise grain */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 200px 200px;
            pointer-events: none;
            z-index: 1;
        }

        /* soft ambient glow behind the name */
        body::after {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 300px;
            transform: translate(-50%, -55%);
            background: radial-gradient(ellipse, rgba(255, 255, 255, 0.015) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 2;
            padding: 2rem;
        }

        h1 {
            font-size: clamp(1.4rem, 3.5vw, 2.4rem);
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #f0ece6;
            line-height: 1.1;
            margin-bottom: 3rem;
            transition: letter-spacing 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .links {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2.2rem;
        }

        .links a {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b6560;
            text-decoration: none;
            transition: color 0.4s ease, transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .links a:hover {
            color: #d4cfc8;
            transform: translateY(-2px);
        }

        .links a svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* thin separator dot between icons */
        .sep {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #2a2825;
            flex-shrink: 0;
        }

        /* load animation */
        .container {
            animation: rise 1s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        h1 {
            animation: rise 1s cubic-bezier(0.23, 1, 0.32, 1) 0.1s both;
        }

        .links {
            animation: rise 1s cubic-bezier(0.23, 1, 0.32, 1) 0.25s both;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            h1 {
                letter-spacing: 0.08em;
                margin-bottom: 2.2rem;
            }

            .links {
                gap: 1.8rem;
            }

            .links a svg {
                width: 20px;
                height: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Alvaro Echeverria</h1>
        <div class="links">
            <a href="https://www.linkedin.com/in/alvaroecheverria/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            </a>
            <span class="sep"></span>
            <a href="mailto:a@echeverria.xyz" aria-label="Email">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M1.5 8.67v8.58a3 3 0 0 0 3 3h15a3 3 0 0 0 3-3V8.67l-8.928 5.493a3 3 0 0 1-3.144 0L1.5 8.67Z"/><path d="M22.5 6.908V6.75a3 3 0 0 0-3-3h-15a3 3 0 0 0-3 3v.158l9.714 5.978a1.5 1.5 0 0 0 1.572 0L22.5 6.908Z"/></svg>
            </a>
        </div>
    </div>
</body>
</html>
